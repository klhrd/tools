<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>典雅適應時鐘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
            --muted-color: #737373;
            --accent-color: #404040;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border-color: rgba(255, 255, 255, 0.05);
            --menu-bg: rgba(20, 20, 20, 0.85);
            --menu-text: #ffffff;
            /* 中性灰定義 - 暗色 */
            --neutral-selected-bg: #262626;
            --neutral-selected-text: #ffffff;
        }

        body.light-mode {
            --bg-color: #f9f9f9;
            --text-color: #171717;
            --muted-color: #a3a3a3;
            --accent-color: #d4d4d4;
            --card-bg: rgba(0, 0, 0, 0.02);
            --border-color: rgba(0, 0, 0, 0.05);
            --menu-bg: rgba(250, 250, 250, 0.9);
            --menu-text: #171717;
            /* 中性灰定義 - 淺色 */
            --neutral-selected-bg: #e5e5e5;
            --neutral-selected-text: #171717;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.7s, color 0.7s;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        .clock-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            gap: 2vh;
        }

        .date-display {
            font-size: clamp(0.7rem, 1.2vw, 1.2rem);
            letter-spacing: 0.5em;
            color: var(--muted-color);
            text-transform: uppercase;
            margin-bottom: 1vh;
        }

        .time-display {
            display: flex;
            align-items: center;
            font-size: clamp(4rem, 22vw, 18rem);
            line-height: 0.85;
            font-weight: 200;
            letter-spacing: -0.05em; 
        }

        .digit-group {
            display: flex;
        }

        .digit {
            display: inline-block;
            width: 0.55em; 
            text-align: center;
        }

        .colon {
            margin: 0 0.05em; 
            color: var(--accent-color);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            position: relative;
            top: -0.05em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .period-display {
            font-size: clamp(0.7rem, 1.5vw, 1.5rem);
            letter-spacing: 0.6em;
            color: var(--muted-color);
            margin-top: 3vh;
        }

        /* 典雅捲動條樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(128, 128, 128, 0.2); 
            border-radius: 10px; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { 
            background: rgba(128, 128, 128, 0.4); 
        }

        .menu-sidebar {
            background-color: var(--menu-bg);
            color: var(--menu-text);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s;
        }

        .sidebar-header h2 {
            color: var(--menu-text);
        }

        .sidebar-section-label {
            color: var(--menu-text);
            opacity: 0.4;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- 漢堡選單按鈕 -->
    <button id="menuBtn" class="absolute top-8 right-8 p-3 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-all z-10">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="4" x2="20" y1="12" y2="12"></line>
            <line x1="4" x2="20" y1="6" y2="6"></line>
            <line x1="4" x2="20" y1="18" y2="18"></line>
        </svg>
    </button>

    <!-- 設定面板 -->
    <div id="sidebar" class="menu-sidebar fixed top-0 right-0 h-full w-80 backdrop-blur-3xl z-50 translate-x-full border-l border-black/5 dark:border-white/5 flex flex-col shadow-2xl">
        <!-- 固定頂部 -->
        <div class="sidebar-header flex justify-between items-center p-8 pb-4">
            <h2 class="text-xs font-semibold tracking-widest uppercase">Settings</h2>
            <button id="closeBtn" class="opacity-50 hover:opacity-100 transition-opacity p-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- 捲動內容區 -->
        <div class="flex-1 overflow-y-auto px-8 custom-scrollbar space-y-10 pb-12">
            <div>
                <h3 class="sidebar-section-label text-[10px] font-bold tracking-widest uppercase mb-4">Theme</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setTheme('dark')" class="theme-opt px-4 py-3 text-xs rounded-xl border border-current transition-all" data-val="dark">Dark</button>
                    <button onclick="setTheme('light')" class="theme-opt px-4 py-3 text-xs rounded-xl border border-current transition-all" data-val="light">Light</button>
                </div>
            </div>

            <div>
                <h3 class="sidebar-section-label text-[10px] font-bold tracking-widest uppercase mb-4">Time Format</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="set12H(false)" class="h12-opt px-4 py-3 text-xs rounded-xl border border-current transition-all" data-val="false">24H</button>
                    <button onclick="set12H(true)" class="h12-opt px-4 py-3 text-xs rounded-xl border border-current transition-all" data-val="true">12H</button>
                </div>
            </div>

            <div>
                <h3 class="sidebar-section-label text-[10px] font-bold tracking-widest uppercase mb-4">Date Format</h3>
                <div class="space-y-2">
                    <button onclick="setDateFormat('zh')" class="date-opt w-full text-left px-4 py-3 text-xs rounded-xl border border-current transition-all" data-val="zh">中文日期</button>
                    <button onclick="setDateFormat('en')" class="date-opt w-full text-left px-4 py-3 text-xs rounded-xl border border-current transition-all" data-val="en">English Date</button>
                </div>
            </div>

            <div>
                <h3 class="sidebar-section-label text-[10px] font-bold tracking-widest uppercase mb-4">Typography</h3>
                <div class="space-y-2">
                    <button onclick="setFont('sans')" class="font-opt w-full text-left px-4 py-3 text-xs rounded-xl border border-current transition-all font-sans" data-val="sans">Modern Sans</button>
                    <button onclick="setFont('serif')" class="font-opt w-full text-left px-4 py-3 text-xs rounded-xl border border-current transition-all font-serif" data-val="serif">Classic Serif</button>
                    <button onclick="setFont('mono')" class="font-opt w-full text-left px-4 py-3 text-xs rounded-xl border border-current transition-all font-mono" data-val="mono">Tech Mono</button>
                </div>
            </div>

            <div>
                <h3 class="sidebar-section-label text-[10px] font-bold tracking-widest uppercase mb-4">Display</h3>
                <button onclick="toggleFS()" class="w-full py-4 rounded-xl border border-current opacity-40 hover:opacity-100 text-xs transition-all flex items-center justify-center gap-2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    全螢幕切換
                </button>
            </div>
        </div>
    </div>

    <!-- 背景遮罩 (點擊關閉選單) -->
    <div id="overlay" class="fixed inset-0 bg-black/20 z-40 hidden backdrop-blur-[2px]"></div>

    <!-- 主體內容 -->
    <div class="clock-container">
        <div id="dateEl" class="date-display">Loading...</div>
        
        <div class="flex flex-col items-center">
            <div class="time-display" id="timeEl">
                <div class="digit-group" id="hourGroup">
                    <span class="digit">0</span><span class="digit">0</span>
                </div>
                <div class="colon">:</div>
                <div class="digit-group" id="minGroup">
                    <span class="digit">0</span><span class="digit">0</span>
                </div>
                <div class="colon">:</div>
                <div class="digit-group" id="secGroup">
                    <span class="digit">0</span><span class="digit">0</span>
                </div>
            </div>
            <div id="periodEl" class="period-display hidden">ANTE MERIDIEM</div>
        </div>
    </div>

    <script>
        // --- 狀態管理 ---
        let state = {
            theme: 'dark',
            date: 'zh',
            h12: false,
            font: 'sans'
        };

        // --- 初始化 Hash ---
        function initFromHash() {
            const hash = window.location.hash.replace('#', '');
            const params = new URLSearchParams(hash);
            if (params.has('theme')) state.theme = params.get('theme');
            if (params.has('date')) state.date = params.get('date');
            if (params.has('h12')) state.h12 = params.get('h12') === 'true';
            if (params.has('font')) state.font = params.get('font');
            applyState();
        }

        function syncHash() {
            const params = new URLSearchParams();
            params.set('theme', state.theme);
            params.set('date', state.date);
            params.set('h12', state.h12);
            params.set('font', state.font);
            window.history.replaceState(null, '', '#' + params.toString());
        }

        // --- UI 更新 ---
        function applyState() {
            // 主題切換
            if (state.theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }

            // 字體切換
            const fonts = {
                sans: 'ui-sans-serif, system-ui, sans-serif',
                serif: 'ui-serif, Georgia, serif',
                mono: 'ui-monospace, monospace'
            };
            document.body.style.fontFamily = fonts[state.font];

            updateButtonStyles();
            syncHash();
        }

        function updateButtonStyles() {
            const updateGroup = (selector, val) => {
                document.querySelectorAll(selector).forEach(btn => {
                    const isActive = btn.getAttribute('data-val') === String(val);
                    if (isActive) {
                        btn.style.opacity = '1';
                        btn.style.borderWidth = '1px';
                        // 使用中性灰變數
                        btn.style.backgroundColor = 'var(--neutral-selected-bg)';
                        btn.style.color = 'var(--neutral-selected-text)';
                        btn.style.borderColor = 'transparent';
                    } else {
                        btn.style.opacity = '0.4';
                        btn.style.backgroundColor = 'transparent';
                        btn.style.color = 'inherit';
                        btn.style.borderColor = 'currentColor';
                        btn.style.borderWidth = '1px';
                    }
                });
            };
            updateGroup('.theme-opt', state.theme);
            updateGroup('.h12-opt', state.h12);
            updateGroup('.date-opt', state.date);
            updateGroup('.font-opt', state.font);
        }

        // --- 功能控制 ---
        window.setTheme = (t) => { state.theme = t; applyState(); };
        window.set12H = (v) => { state.h12 = v; applyState(); };
        window.setDateFormat = (d) => { state.date = d; applyState(); };
        window.setFont = (f) => { state.font = f; applyState(); };
        window.toggleFS = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
            else document.exitFullscreen();
        };

        // --- 時鐘核心邏輯 ---
        function updateClock() {
            const now = new Date();
            
            const dateEl = document.getElementById('dateEl');
            if (state.date === 'en') {
                dateEl.innerText = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            } else {
                dateEl.innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            }

            let h = now.getHours();
            const isPM = h >= 12;
            if (state.h12) {
                h = h % 12 || 12;
                document.getElementById('periodEl').classList.remove('hidden');
                document.getElementById('periodEl').innerText = isPM ? 'Post Meridiem' : 'Ante Meridiem';
            } else {
                document.getElementById('periodEl').classList.add('hidden');
            }

            const hStr = h.toString().padStart(2, '0');
            const mStr = now.getMinutes().toString().padStart(2, '0');
            const sStr = now.getSeconds().toString().padStart(2, '0');

            updateDigitGroup('hourGroup', hStr, state.h12 && hStr[0] === '0');
            updateDigitGroup('minGroup', mStr, false);
            updateDigitGroup('secGroup', sStr, false);
        }

        function updateDigitGroup(id, str, fadeFirst) {
            const container = document.getElementById(id);
            const digits = container.querySelectorAll('.digit');
            digits[0].innerText = str[0];
            digits[0].style.opacity = fadeFirst ? '0.1' : '1';
            digits[1].innerText = str[1];
        }

        // --- 選單控制 ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        document.getElementById('menuBtn').onclick = () => {
            sidebar.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
        };
        
        const closeMenu = () => {
            sidebar.classList.add('translate-x-full');
            overlay.classList.add('hidden');
        };

        document.getElementById('closeBtn').onclick = closeMenu;
        overlay.onclick = closeMenu;

        // 初始化
        initFromHash();
        setInterval(updateClock, 100);
        updateClock();
    </script>
</body>
</html>
