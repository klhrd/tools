<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta name="theme-color" content="#0d0e15">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finger Lottery">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>指尖抽籤器 - 進階多點觸控隨機抽選</title>
  <style>
    /* 消除預設邊距與手勢干擾 */
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0e15;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #f3f4f6;
      touch-action: none;
    }

    /* 背景微光裝飾 */
    .ambient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0d0e15 100%);
      z-index: 1;
      pointer-events: none;
      transition: background 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 資訊面板 */
    .info-panel {
      position: absolute;
      top: calc(24px + env(safe-area-inset-top, 0px));
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .counter-container {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      min-width: 160px;
    }

    .counter-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #9ca3af;
      margin-bottom: 2px;
    }

    .counter-number {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-variant-numeric: tabular-nums;
    }

    .counter-status {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
      font-weight: 500;
      transition: color 0.2s;
    }

    /* 狀態樣式 */
    .status-ready {
      color: #a5b4fc;
    }

    .status-counting {
      color: #fbbf24;
    }

    .status-winner {
      color: #ffffff;
    }

    /* 畫布區域 */
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      display: block;
    }

    /* 抽中時的中央大字 */
    .winner-announcement {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .winner-announcement.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .winner-name {
      font-size: 110px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 255, 255, 0.3);
      letter-spacing: -0.05em;
    }

    /* 自訂彈出通知 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(13, 14, 21, 0.9);
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 12px 24px;
      border-radius: 12px;
      color: #f3f4f6;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ================= 漢堡按鈕與側邊設定選單 ================= */

    /* 漢堡按鈕 */
    .menu-btn {
      position: absolute;
      top: calc(24px + env(safe-area-inset-top, 0px));
      right: calc(20px + env(safe-area-inset-right, 0px));
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      color: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
      touch-action: manipulation;
    }

    .menu-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.12);
    }

    /* 側邊設定面板 */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -340px;
      width: 320px;
      height: 100%;
      background: rgba(13, 14, 21, 0.88);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 30;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.6);
    }

    .settings-panel.open {
      transform: translateX(-340px);
    }

    /* 選單標題列 */
    .settings-header {
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top, 0px));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-header h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .close-panel-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .close-panel-btn:active {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    /* 設定內容滾動區 */
    .settings-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }

    /* 分類區塊 */
    .settings-group {
      margin-bottom: 24px;
    }

    .settings-group-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #818cf8;
      margin-bottom: 16px;
      font-weight: 700;
      border-left: 3px solid #6366f1;
      padding-left: 8px;
    }

    /* 設定項目元件 */
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .setting-item:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      flex: 1;
      padding-right: 16px;
    }

    .setting-title {
      font-size: 14px;
      font-weight: 500;
      color: #f3f4f6;
      margin-bottom: 2px;
    }

    .setting-desc {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.3;
    }

    /* 微調滑桿 */
    .range-slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 120px;
    }

    .range-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.12);
      outline: none;
    }

    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6366f1;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .range-slider::-webkit-slider-thumb:active {
      transform: scale(1.3);
    }

    .range-value {
      font-size: 13px;
      font-weight: 700;
      color: #818cf8;
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Switch 按鈕 */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .3s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #9ca3af;
      transition: .3s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: rgba(99, 102, 241, 0.35);
      border-color: rgba(99, 102, 241, 0.5);
    }

    input:checked+.slider:before {
      transform: translateX(20px);
      background-color: #818cf8;
      box-shadow: 0 0 8px rgba(129, 140, 248, 0.6);
    }

    /* 複製連結區塊 */
    .share-section {
      margin-top: 10px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .share-btn {
      width: 100%;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border: none;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .share-btn:active {
      transform: scale(0.96);
      filter: brightness(0.9);
    }

    /* 遮罩幕 */
    .backdrop-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .backdrop-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>

  <div class="ambient-bg" id="ambient-bg"></div>

  <!-- 漢堡選單按鈕 -->
  <button class="menu-btn" id="menu-btn">
    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="12" x2="20" y2="12"></line>
      <line x1="4" y1="6" x2="20" y2="6"></line>
      <line x1="4" y1="18" x2="20" y2="18"></line>
    </svg>
  </button>

  <!-- 側邊設定面板 -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-header">
      <h2>功能設定</h2>
      <button class="close-panel-btn" id="close-panel-btn">✕</button>
    </div>
    <div class="settings-content">

      <!-- 分類一：機制與時間 -->
      <div class="settings-group">
        <div class="settings-group-title">⏱️ 機制與時間</div>

        <!-- 計時秒數 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">計時器秒數</div>
            <div class="setting-desc">調整按住手指後的抽籤秒數</div>
          </div>
          <div class="range-slider-container">
            <input type="range" class="range-slider" id="timer-slider" min="1" max="10" value="3">
            <span class="range-value" id="timer-val">3s</span>
          </div>
        </div>

        <!-- 新玩家重置計時 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">新成員加入重置</div>
            <div class="setting-desc">倒數中若有新玩家碰觸則重新計時</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="reset-on-join" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- 分類二：視覺與音效 -->
      <div class="settings-group">
        <div class="settings-group-title">🎨 視覺與音效</div>

        <!-- 聲音回饋 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">聲音回饋</div>
            <div class="setting-desc">啟用按壓、倒數與獲勝音效</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="enable-sound" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- 彩帶特效 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">噴發紙屑特效</div>
            <div class="setting-desc">選出得獎者時噴灑五彩紙屑</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="show-confetti" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- 分類三：顯示與介面 -->
      <div class="settings-group">
        <div class="settings-group-title">📺 顯示與介面</div>

        <!-- 玩家代指模式 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">用高級顏色名稱</div>
            <div class="setting-desc">使用「珊瑚紅、冰晶藍」取代「P1、P2」</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="use-color-names">
            <span class="slider"></span>
          </label>
        </div>

        <!-- 隱藏懸浮提示窗 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">顯示提示卡片</div>
            <div class="setting-desc">在上方懸浮顯示狀態資訊與人數</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="show-info-panel" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- 完全無文字模式 -->
        <div class="setting-item">
          <div class="setting-label">
            <div class="setting-title">完全無文字模式</div>
            <div class="setting-desc">隱藏所有數字、標籤與中央提示</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="minimal-mode">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- 分類四：複製分享 -->
      <div class="share-section">
        <button class="share-btn" id="share-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
          </svg>
          複製當前設定連結
        </button>
      </div>

    </div>
  </div>

  <!-- 遮罩幕 -->
  <div class="backdrop-overlay" id="backdrop-overlay"></div>

  <div class="info-panel" id="info-panel">
    <div class="counter-container" id="counter-card">
      <div class="counter-title" id="counter-title">準備就緒</div>
      <div class="counter-number" id="touch-count">0</div>
      <div class="counter-status" id="status-text">請放入至少 2 個手指</div>
    </div>
  </div>

  <!-- 僅保留極簡中央獲獎名字 -->
  <div class="winner-announcement" id="winner-announcement">
    <div class="winner-name" id="winner-name">P1</div>
  </div>

  <!-- 自訂輕量彈窗 -->
  <div class="toast" id="toast">設定連結已複製！</div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const touchCountEl = document.getElementById('touch-count');
    const statusTextEl = document.getElementById('status-text');
    const counterTitleEl = document.getElementById('counter-title');
    const counterCard = document.getElementById('counter-card');
    const ambientBg = document.getElementById('ambient-bg');
    const winnerAnnounce = document.getElementById('winner-announcement');
    const winnerNameEl = document.getElementById('winner-name');
    const infoPanel = document.getElementById('info-panel');
    const toastEl = document.getElementById('toast');

    // 選單 DOM 節點
    const menuBtn = document.getElementById('menu-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const closePanelBtn = document.getElementById('close-panel-btn');
    const backdropOverlay = document.getElementById('backdrop-overlay');
    const shareBtn = document.getElementById('share-btn');

    // 各設定欄位控制項
    const timerSlider = document.getElementById('timer-slider');
    const timerVal = document.getElementById('timer-val');
    const resetOnJoinInput = document.getElementById('reset-on-join');
    const enableSoundInput = document.getElementById('enable-sound');
    const showConfettiInput = document.getElementById('show-confetti');
    const useColorNamesInput = document.getElementById('use-color-names');
    const showInfoPanelInput = document.getElementById('show-info-panel');
    const minimalModeInput = document.getElementById('minimal-mode');

    // 高級感配色方案
    const colors = [{
        name: '珊瑚紅',
        main: '#ff5e62',
        glow: 'rgba(255, 94, 98, 0.45)',
        pulse: 'rgba(255, 94, 98, 0.15)'
      },
      {
        name: '薄荷綠',
        main: '#38ef7d',
        glow: 'rgba(56, 239, 125, 0.45)',
        pulse: 'rgba(56, 239, 125, 0.15)'
      },
      {
        name: '冰晶藍',
        main: '#00f2fe',
        glow: 'rgba(0, 242, 254, 0.45)',
        pulse: 'rgba(0, 242, 254, 0.15)'
      },
      {
        name: '霓虹粉',
        main: '#ff007f',
        glow: 'rgba(255, 0, 127, 0.45)',
        pulse: 'rgba(255, 0, 127, 0.15)'
      },
      {
        name: '活力橙',
        main: '#ff9900',
        glow: 'rgba(255, 153, 0, 0.45)',
        pulse: 'rgba(255, 153, 0, 0.15)'
      },
      {
        name: '魅惑紫',
        main: '#b156ff',
        glow: 'rgba(177, 86, 255, 0.45)',
        pulse: 'rgba(177, 86, 255, 0.15)'
      },
      {
        name: '璀璨金',
        main: '#ffd700',
        glow: 'rgba(255, 215, 0, 0.45)',
        pulse: 'rgba(255, 215, 0, 0.15)'
      },
      {
        name: '赤焰紅',
        main: '#ff4b2b',
        glow: 'rgba(255, 75, 43, 0.45)',
        pulse: 'rgba(255, 75, 43, 0.15)'
      },
      {
        name: '極光藍',
        main: '#4facfe',
        glow: 'rgba(79, 172, 254, 0.45)',
        pulse: 'rgba(79, 172, 254, 0.15)'
      },
      {
        name: '薰衣草',
        main: '#c9a0ff',
        glow: 'rgba(201, 160, 255, 0.45)',
        pulse: 'rgba(201, 160, 255, 0.15)'
      }
    ];

    // 預設核心配置
    const config = {
      duration: 3000,
      resetOnJoin: true,
      enableSound: true,
      showConfetti: true,
      useColorNames: false,
      showInfoPanel: true,
      minimalMode: false
    };

    // Web Audio API 合成器控制
    let audioCtx = null;
    let metronomeInterval = null;
    let lastBeatTime = 0;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSound(type) {
      if (!config.enableSound) return;
      try {
        initAudio();
        const now = audioCtx.currentTime;

        if (type === 'press') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(587.33, now); // D5
          osc.frequency.exponentialRampToValueAtTime(880, now + 0.08);
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'tick') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(150, now);
          gain.gain.setValueAtTime(0.25, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.06);
        } else if (type === 'win') {
          const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          freqs.forEach((freq, idx) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + idx * 0.05);
            gain.gain.setValueAtTime(0.1, now + idx * 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + idx * 0.05);
            osc.stop(now + 0.7);
          });
        }
      } catch (e) {
        console.warn('Audio play block:', e);
      }
    }

    function getCompressedHash() {
      const sec = Math.round(config.duration / 1000);
      const reset = config.resetOnJoin ? '1' : '0';
      const confetti = config.showConfetti ? '1' : '0';
      const colName = config.useColorNames ? '1' : '0';
      const info = config.showInfoPanel ? '1' : '0';
      const minimal = config.minimalMode ? '1' : '0';
      const sound = config.enableSound ? '1' : '0';
      return `${sec}${reset}${confetti}${colName}${info}${minimal}${sound}`;
    }

    function parseHash() {
      const hash = window.location.hash.substring(1);
      if (hash && hash.length >= 7) {
        const parts = hash.split('');
        const sec = Math.max(1, Math.min(10, parseInt(parts[0]) || 3));

        config.duration = sec * 1000;
        config.resetOnJoin = parts[1] === '1';
        config.showConfetti = parts[2] === '1';
        config.useColorNames = parts[3] === '1';
        config.showInfoPanel = parts[4] === '1';
        config.minimalMode = parts[5] === '1';
        config.enableSound = parts[6] === '1';

        timerSlider.value = sec;
        timerVal.textContent = `${sec}s`;
        resetOnJoinInput.checked = config.resetOnJoin;
        showConfettiInput.checked = config.showConfetti;
        useColorNamesInput.checked = config.useColorNames;
        showInfoPanelInput.checked = config.showInfoPanel;
        minimalModeInput.checked = config.minimalMode;
        enableSoundInput.checked = config.enableSound;

        applyUIVisibility();
      }
    }

    function updateUrlHash() {
      window.history.replaceState(null, null, `#${getCompressedHash()}`);
    }

    function applyUIVisibility() {
      if (config.minimalMode) {
        infoPanel.style.display = 'none';
        winnerAnnounce.classList.remove('show');
      } else {
        infoPanel.style.display = config.showInfoPanel ? 'flex' : 'none';
        if (gameState === 'winner') winnerAnnounce.classList.add('show');
      }
    }

    // 核心設定綁定
    timerSlider.addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      timerVal.textContent = `${val}s`;
      config.duration = val * 1000;
      updateUrlHash();
      onTouchCountChanged();
    });

    resetOnJoinInput.addEventListener('change', (e) => {
      config.resetOnJoin = e.target.checked;
      updateUrlHash();
    });
    enableSoundInput.addEventListener('change', (e) => {
      config.enableSound = e.target.checked;
      updateUrlHash();
      if (config.enableSound) initAudio();
    });
    showConfettiInput.addEventListener('change', (e) => {
      config.showConfetti = e.target.checked;
      updateUrlHash();
    });
    useColorNamesInput.addEventListener('change', (e) => {
      config.useColorNames = e.target.checked;
      updateUrlHash();
      onTouchCountChanged();
    });
    showInfoPanelInput.addEventListener('change', (e) => {
      config.showInfoPanel = e.target.checked;
      updateUrlHash();
      applyUIVisibility();
    });
    minimalModeInput.addEventListener('change', (e) => {
      config.minimalMode = e.target.checked;
      updateUrlHash();
      applyUIVisibility();
    });

    shareBtn.addEventListener('click', () => {
      const shareUrl = `${window.location.origin}${window.location.pathname}#${getCompressedHash()}`;
      const tempInput = document.createElement('input');
      tempInput.value = shareUrl;
      document.body.appendChild(tempInput);
      tempInput.select();
      try {
        document.execCommand('copy');
        showToast('已複製帶有當前設定的分享網址！');
      } catch (err) {
        console.error(err);
      }
      document.body.removeChild(tempInput);
    });

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, 2500);
    }

    // 【重要修正 1】優化 UI 事件防穿透，避免阻斷按鈕自身的點擊事件
    const uiElementsToBlock = [settingsPanel, menuBtn, backdropOverlay, toastEl];
    uiElementsToBlock.forEach(el => {
      el.addEventListener('touchstart', (e) => {
        e.stopPropagation();
      }, {
        passive: true
      });
      el.addEventListener('touchmove', (e) => {
        e.stopPropagation();
        e.preventDefault();
      }, {
        passive: false
      });
      el.addEventListener('touchend', (e) => {
        e.stopPropagation();
      }, {
        passive: true
      });
    });

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      initAudio();
      settingsPanel.classList.add('open');
      backdropOverlay.classList.add('open');
    });

    const closeMenu = (e) => {
      if (e) e.stopPropagation();
      settingsPanel.classList.remove('open');
      backdropOverlay.classList.remove('open');
    };

    closePanelBtn.addEventListener('click', closeMenu);
    backdropOverlay.addEventListener('click', closeMenu);

    // 畫布核心運作變數
    let activeTouches = {};
    let gameState = 'idle';
    let countdownProgress = 0;
    let lastTime = performance.now();

    let winnerId = null;
    let winnerColorObj = null;

    let pulseAngle = 0;
    let confettiParticles = [];
    let fillBgRadius = 0;
    let fillBgMaxRadius = 0;
    let winnerOriginX = 0;
    let winnerOriginY = 0;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      fillBgMaxRadius = Math.hypot(window.innerWidth, window.innerHeight) * 1.2;
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', resizeCanvas);
    resizeCanvas();

    function getTouchColor(index) {
      return colors[Math.abs(index) % colors.length];
    }

    function getPlayerLabel(touchIndex) {
      if (config.useColorNames) return getTouchColor(touchIndex).name;
      return `P${touchIndex + 1}`;
    }

    function onTouchCountChanged() {
      const count = Object.keys(activeTouches).length;
      updateUI(count);

      if (gameState === 'winner') {
        if (count === 0) resetGame();
        return;
      }

      if (count >= 2) {
        if (gameState !== 'counting') {
          gameState = 'counting';
          countdownProgress = 0;
          lastBeatTime = 0;
        }
      } else {
        gameState = 'idle';
        countdownProgress = 0;
      }
    }

    function selectWinner() {
      const keys = Object.keys(activeTouches);
      if (keys.length < 2) return;

      gameState = 'winner';
      playSound('win');

      winnerId = keys[Math.floor(Math.random() * keys.length)];
      const winnerTouch = activeTouches[winnerId];
      winnerColorObj = getTouchColor(winnerTouch.index);

      winnerOriginX = winnerTouch.currentX;
      winnerOriginY = winnerTouch.currentY;
      fillBgRadius = 0;

      if (config.showConfetti) createConfetti(winnerOriginX, winnerOriginY);

      ambientBg.style.background = winnerColorObj.main;

      const winnerLabel = getPlayerLabel(winnerTouch.index);
      counterTitleEl.textContent = "抽選結果";
      statusTextEl.textContent = `${winnerLabel} 獲選！`;
      statusTextEl.className = 'counter-status status-winner';

      counterCard.style.transform = 'scale(1.1)';
      counterCard.style.boxShadow = `0 15px 35px ${winnerColorObj.glow}`;
      counterCard.style.borderColor = winnerColorObj.main;

      if (!config.minimalMode) {
        winnerNameEl.textContent = winnerLabel;
        winnerNameEl.style.fontSize = winnerLabel.length > 3 ? '70px' : '120px';
        winnerAnnounce.classList.add('show');
      }
    }

    function resetGame() {
      gameState = 'idle';
      winnerId = null;
      winnerColorObj = null;
      confettiParticles = [];
      fillBgRadius = 0;
      countdownProgress = 0;

      ambientBg.style.background = 'radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0d0e15 100%)';
      winnerAnnounce.classList.remove('show');

      const count = Object.keys(activeTouches).length;
      updateUI(count);
    }

    function updateUI(count) {
      touchCountEl.textContent = count;
      if (gameState === 'winner') return;

      if (count >= 2) {
        counterTitleEl.textContent = "即將抽籤";
        statusTextEl.textContent = "請按住螢幕...";
        statusTextEl.className = 'counter-status status-counting';
        counterCard.style.transform = 'scale(1.05)';
        counterCard.style.boxShadow = '0 15px 35px rgba(251, 191, 36, 0.25)';
        counterCard.style.borderColor = 'rgba(251, 191, 36, 0.4)';
      } else {
        counterTitleEl.textContent = "準備就緒";
        statusTextEl.textContent = count === 1 ? "還需要至少 1 個手指" : "請放入至少 2 個手指";
        statusTextEl.className = 'counter-status status-ready';
        counterCard.style.transform = 'scale(1)';
        counterCard.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.5)';
        counterCard.style.borderColor = 'rgba(255, 255, 255, 0.08)';
      }
    }

    function createConfetti(x, y) {
      confettiParticles = [];
      const count = 120;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 9;
        confettiParticles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2.5,
          color: colors[Math.floor(Math.random() * colors.length)].main,
          size: 4 + Math.random() * 6,
          alpha: 1,
          decay: 0.012 + Math.random() * 0.012,
          rotation: Math.random() * 360,
          rotationSpeed: -8 + Math.random() * 16
        });
      }
    }

    function draw(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      if (gameState === 'counting') {
        countdownProgress += dt;
        const elapsedPercent = countdownProgress / config.duration;
        const tickInterval = Math.max(150, 1000 * (1 - elapsedPercent * 0.85));
        if (timestamp - lastBeatTime > tickInterval) {
          playSound('tick');
          lastBeatTime = timestamp;
        }
        if (countdownProgress >= config.duration) {
          countdownProgress = config.duration;
          selectWinner();
        }
      }

      const elapsedPercent = Math.min(countdownProgress / config.duration, 1);
      const remainingSec = Math.ceil((config.duration - countdownProgress) / 1000);

      if (gameState === 'winner' && winnerColorObj) {
        ctx.fillStyle = '#0d0e15';
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        if (fillBgRadius < fillBgMaxRadius) {
          fillBgRadius += (fillBgMaxRadius - fillBgRadius) * 0.09 + 2;
        }
        ctx.beginPath();
        ctx.arc(winnerOriginX, winnerOriginY, fillBgRadius, 0, Math.PI * 2);
        ctx.fillStyle = winnerColorObj.main;
        ctx.fill();
      } else {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      pulseAngle += 0.05;
      const breath = Math.sin(pulseAngle) * 4;

      Object.keys(activeTouches).forEach(id => {
        const touch = activeTouches[id];
        const color = getTouchColor(touch.index);

        if (gameState === 'winner' && id !== winnerId) return;

        touch.currentX += (touch.targetX - touch.currentX) * 0.45;
        touch.currentY += (touch.targetY - touch.currentY) * 0.45;

        const x = touch.currentX;
        const y = touch.currentY;

        ctx.save();
        ctx.beginPath();
        if (gameState === 'winner') {
          ctx.arc(x, y, 75 + Math.sin(pulseAngle * 1.5) * 6, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
        } else {
          ctx.arc(x, y, 70 + breath, 0, Math.PI * 2);
          ctx.fillStyle = color.pulse;
        }
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, 48, 0, Math.PI * 2);
        ctx.fillStyle = gameState === 'winner' ? 'rgba(255, 255, 255, 0.2)' : color.glow;
        ctx.fill();

        if (gameState === 'counting') {
          ctx.beginPath();
          ctx.arc(x, y, 54, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * elapsedPercent));
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 8;
          ctx.stroke();
          ctx.shadowBlur = 0;

          if (!config.minimalMode) {
            ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(remainingSec, x, y);
            ctx.shadowBlur = 0;
          }
        }

        ctx.beginPath();
        ctx.arc(x, y, 32, 0, Math.PI * 2);
        if (gameState === 'winner') {
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 5;
          ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
          ctx.shadowBlur = 20;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 4;
        } else {
          ctx.strokeStyle = color.main;
          ctx.lineWidth = 3;
          ctx.shadowColor = color.main;
          ctx.shadowBlur = 15;
        }
        ctx.stroke();
        ctx.restore();

        if (gameState !== 'counting' || config.minimalMode) {
          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
        }

        ctx.beginPath();
        ctx.strokeStyle = gameState === 'winner' ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 1;
        ctx.moveTo(x - 60, y);
        ctx.lineTo(x - 40, y);
        ctx.moveTo(x + 40, y);
        ctx.lineTo(x + 60, y);
        ctx.moveTo(x, y - 60);
        ctx.lineTo(x, y - 40);
        ctx.moveTo(x, y + 40);
        ctx.lineTo(x, y + 60);
        ctx.stroke();

        if (!config.minimalMode) {
          ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = '#ffffff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const label = getPlayerLabel(touch.index);
          ctx.fillText(label, x, y - 85);

          const coord = `X: ${Math.round(x)} Y: ${Math.round(y)}`;
          ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = gameState === 'winner' ? 'rgba(255, 255, 255, 0.7)' : 'rgba(255, 255, 255, 0.45)';
          ctx.fillText(coord, x, y - 102);
        }
      });

      if (confettiParticles.length > 0) {
        confettiParticles.forEach((p, idx) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.14;
          p.vx *= 0.98;
          p.alpha -= p.decay;
          p.rotation += p.rotationSpeed;
          if (p.alpha <= 0) {
            confettiParticles.splice(idx, 1);
            return;
          }
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
        });
      }

      requestAnimationFrame(draw);
    }

    // 觸控點管理邏輯
    function handleTouchStart(e) {
      e.preventDefault();
      if (gameState === 'winner') return;

      initAudio();
      let hasNewTouch = false;

      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const usedIndices = Object.values(activeTouches).map(t => t.index);
        let assignedIndex = 0;
        while (usedIndices.includes(assignedIndex)) {
          assignedIndex++;
        }

        activeTouches[touch.identifier] = {
          targetX: touch.clientX,
          targetY: touch.clientY,
          currentX: touch.clientX,
          currentY: touch.clientY,
          index: assignedIndex
        };
        hasNewTouch = true;
      }

      if (hasNewTouch) {
        playSound('press');
        if (config.resetOnJoin && gameState === 'counting') {
          countdownProgress = 0;
          lastBeatTime = 0;
        }
      }
      onTouchCountChanged();
    }

    function handleTouchMove(e) {
      e.preventDefault();
      for (let i = 0; i < e.targetTouches.length; i++) {
        const touch = e.targetTouches[i];
        if (activeTouches[touch.identifier]) {
          activeTouches[touch.identifier].targetX = touch.clientX;
          activeTouches[touch.identifier].targetY = touch.clientY;
        }
      }
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        delete activeTouches[touch.identifier];
      }
      onTouchCountChanged();
    }

    // 【重要修正 2】在 Canvas 上明確阻斷預設行為（防止縮放、滑動干擾）
    canvas.addEventListener('touchstart', handleTouchStart, {
      passive: false
    });
    canvas.addEventListener('touchmove', handleTouchMove, {
      passive: false
    });
    canvas.addEventListener('touchend', handleTouchEnd, {
      passive: false
    });
    canvas.addEventListener('touchcancel', handleTouchEnd, {
      passive: false
    });

    // 【重要修正 3】新增滑鼠事件模擬（支援 PC 瀏覽器排查測試與單人模擬）
    let isMouseDown = false;
    canvas.addEventListener('mousedown', (e) => {
      if (gameState === 'winner') return;
      initAudio();
      isMouseDown = true;
      activeTouches['mouse'] = {
        targetX: e.clientX,
        targetY: e.clientY,
        currentX: e.clientX,
        currentY: e.clientY,
        index: 0
      };
      playSound('press');
      onTouchCountChanged();
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isMouseDown || !activeTouches['mouse']) return;
      activeTouches['mouse'].targetX = e.clientX;
      activeTouches['mouse'].targetY = e.clientY;
    });

    const handleMouseUp = () => {
      if (!isMouseDown) return;
      isMouseDown = false;
      delete activeTouches['mouse'];
      onTouchCountChanged();
    };
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('mouseleave', handleMouseUp);

    // 初始化
    parseHash();
    requestAnimationFrame((timestamp) => {
      lastTime = timestamp;
      draw(timestamp);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.worker = navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
