<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketGuitar - 虛擬吉他手</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Tone.js 用於音訊處理 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    /* 隱藏捲軸但保持可捲動 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans selection:bg-blue-500/30">

  <!-- 音訊初始化遮罩 (瀏覽器要求使用者互動才能發聲) -->
  <div id="audio-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity duration-300">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md text-center border border-slate-600">
      <svg class="w-16 h-16 text-blue-400 mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
      </svg>
      <h2 class="text-2xl font-bold mb-4">準備好彈奏了嗎？</h2>
      <p class="text-slate-400 mb-8">網頁瀏覽器需要您的點擊互動，才能啟動吉他音效引擎。</p>
      <button onclick="initAudio()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-blue-500/25 flex justify-center items-center gap-2">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
        啟動音效引擎
      </button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto space-y-6 p-6">
    
    <!-- 頭部設定列 -->
    <div class="flex flex-col md:flex-row justify-between items-center bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
      <div class="flex items-center space-x-3 mb-4 md:mb-0">
        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
        <h1 class="text-xl font-bold tracking-wider">PocketGuitar</h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <label class="flex items-center space-x-2 text-sm text-slate-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span>調弦設定：</span>
          <select id="tuning-select" onchange="handleTuningChange(this.value)" class="bg-slate-700 border border-slate-600 text-slate-100 py-1 px-3 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            <!-- 選項由 JS 動態產生 -->
          </select>
        </label>
        
        <button onclick="resetFretboard()" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded-md text-sm transition-colors">
          重置指位
        </button>
      </div>
    </div>

    <!-- 核心區域：包含指板與觸發區 -->
    <div class="flex flex-col xl:flex-row gap-6">
      
      <!-- 指板主體 -->
      <div class="flex-1 bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700 overflow-x-auto no-scrollbar">
        <div class="min-w-[800px] relative">
          
          <!-- 琴格標記點 (背景層) -->
          <div id="fret-markers" class="absolute top-0 bottom-0 left-0 right-0 flex pointer-events-none z-0">
            <!-- 由 JS 動態產生 -->
          </div>

          <!-- 弦的渲染區 (互動層) -->
          <div id="fretboard-strings" class="relative z-10 flex flex-col justify-between py-2 gap-2">
            <!-- 由 JS 動態產生 -->
          </div>

          <!-- 琴格數字標示 -->
          <div id="fret-numbers" class="flex ml-16 text-xs text-slate-500 font-mono mt-2">
            <!-- 由 JS 動態產生 -->
          </div>

        </div>
      </div>

      <!-- 側邊刷弦控制區 -->
      <div class="flex xl:flex-col flex-row gap-4 justify-center items-center bg-slate-800 p-6 rounded-xl border border-slate-700 min-w-[120px]">
         <h3 class="text-sm font-semibold text-slate-400 tracking-widest hidden xl:block mb-4">STRUM</h3>
         <button onclick="playStrum('down')" class="flex flex-col items-center justify-center p-4 bg-gradient-to-b from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 rounded-xl shadow-lg transform active:scale-95 transition-all w-24 h-24">
            <svg class="w-8 h-8 text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            <span class="text-xs font-bold text-white">下刷</span>
         </button>

         <button onclick="playStrum('up')" class="flex flex-col items-center justify-center p-4 bg-gradient-to-t from-emerald-600 to-emerald-800 hover:from-emerald-500 hover:to-emerald-700 rounded-xl shadow-lg transform active:scale-95 transition-all w-24 h-24">
            <svg class="w-8 h-8 text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
            <span class="text-xs font-bold text-white">上刷</span>
         </button>
      </div>

    </div>

    <!-- 底部資訊區：合弦識別與六線譜渲染 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col justify-center items-center relative overflow-hidden">
         <div class="absolute top-0 right-0 p-4 opacity-5">
            <svg class="w-32 h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
         </div>
         <h2 class="text-slate-400 text-sm font-semibold tracking-wider mb-2 z-10">偵測結果 (CHORD / NOTES)</h2>
         <div id="detected-chord" class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 z-10 text-center min-h-[60px]">
           無 (請按弦)
         </div>
         <div id="active-notes" class="mt-4 flex gap-2 z-10 flex-wrap justify-center min-h-[30px]">
           <!-- 音符標籤動態產生 -->
         </div>
      </div>

      <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 min-h-[200px] flex flex-col">
         <h2 class="text-slate-400 text-sm font-semibold tracking-wider mb-4 text-center">吉他六線譜 (TABLATURE)</h2>
         <div class="flex-1 bg-white/90 rounded-lg p-2 overflow-hidden flex items-center">
            <div id="tab-score" class="w-full flex flex-col justify-center items-start bg-white p-4 rounded text-slate-800 font-mono text-lg relative overflow-hidden">
                <!-- 六線譜動態產生 -->
            </div>
         </div>
      </div>

    </div>
    
  </div>

  <script>
    // --- 核心音樂邏輯 ---
    const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const FLAT_TO_SHARP = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };

    const transposeNote = (noteStr, semitones) => {
      const match = noteStr.match(/^([A-G]#?|b?)([0-9])$/);
      if (!match) return noteStr;
      let [_, noteName, octaveStr] = match;
      let octave = parseInt(octaveStr, 10);
      
      if (FLAT_TO_SHARP[noteName]) noteName = FLAT_TO_SHARP[noteName];
      
      let idx = NOTE_NAMES.indexOf(noteName);
      if (idx === -1) return noteStr;

      idx += semitones;
      while (idx >= 12) { idx -= 12; octave += 1; }
      while (idx < 0) { idx += 12; octave -= 1; }
      return `${NOTE_NAMES[idx]}${octave}`;
    };

    // --- 應用程式狀態 ---
    const TUNINGS = {
      "標準調弦 (Standard)": ["E4", "B3", "G3", "D3", "A2", "E2"],
      "Drop D": ["E4", "B3", "G3", "D3", "A2", "D2"],
      "Open G": ["D4", "B3", "G3", "D3", "G2", "D2"],
      "半音降調 (Half Step Down)": ["Eb4", "Bb3", "Gb3", "Db3", "Ab2", "Eb2"]
    };
    
    let currentTuningName = "標準調弦 (Standard)";
    let tuning = TUNINGS[currentTuningName];
    // -1 = 悶音, 0 = 空弦, 1~12 = 按壓琴格
    let fretboard = [-1, -1, -1, -1, -1, -1]; 
    const FRETS = 12;
    let synth = null;
    let isAudioReady = false;

    // --- 音訊引擎初始化 ---
    async function initAudio() {
      if (!isAudioReady) {
        await Tone.start();
        synth = new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: "triangle" },
          envelope: { attack: 0.005, decay: 0.5, sustain: 0.2, release: 1.5 }
        }).toDestination();
        Tone.getDestination().volume.value = -8; 
        isAudioReady = true;
        
        // 隱藏遮罩
        const overlay = document.getElementById('audio-overlay');
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    // --- 互動邏輯 ---
    async function handleFretClick(stringIdx, fretNum) {
      if (!isAudioReady) await initAudio();
      
      if (fretboard[stringIdx] === fretNum) {
        fretboard[stringIdx] = -1; // 取消按壓變悶音
      } else {
        fretboard[stringIdx] = fretNum;
        const noteToPlay = transposeNote(tuning[stringIdx], fretNum);
        if (synth) synth.triggerAttackRelease(noteToPlay, "2n");
      }
      updateUI();
    }

    async function toggleMuteOrPlay(stringIdx) {
      if (!isAudioReady) await initAudio();
      
      if (fretboard[stringIdx] === -1) {
        fretboard[stringIdx] = 0; // 解除悶音，變空弦
        const noteToPlay = tuning[stringIdx];
        if (synth) synth.triggerAttackRelease(noteToPlay, "2n");
      } else {
        fretboard[stringIdx] = -1; // 變悶音
      }
      updateUI();
    }

    async function playStrum(direction) {
      if (!isAudioReady) await initAudio();
      if (!synth) return;

      const now = Tone.now();
      const activeNotes = fretboard
        .map((fret, idx) => ({ note: fret === -1 ? null : transposeNote(tuning[idx], fret), idx }))
        .filter(item => item.note !== null);
      
      if (direction === 'down') {
        activeNotes.sort((a, b) => b.idx - a.idx); // 從粗弦(大索引)到細弦(小索引)
      } else {
        activeNotes.sort((a, b) => a.idx - b.idx);
      }

      activeNotes.forEach((item, i) => {
        synth.triggerAttackRelease(item.note, "1m", now + i * 0.04);
      });
    }

    function handleTuningChange(newTuning) {
      currentTuningName = newTuning;
      tuning = TUNINGS[newTuning];
      fretboard = [0, 0, 0, 0, 0, 0]; // 切換調弦時預設變為全空弦
      updateUI();
    }

    function resetFretboard() {
      fretboard = [0, 0, 0, 0, 0, 0];
      updateUI();
    }

    // --- UI 渲染邏輯 ---
    function updateUI() {
      renderFretboard();
      renderChordAndNotes();
      renderTablature();
    }

    function renderFretboard() {
      // 1. 產生弦與琴格
      const stringsContainer = document.getElementById('fretboard-strings');
      let stringsHTML = '';
      
      tuning.forEach((openNote, stringIdx) => {
        const stringThickness = 1 + (stringIdx * 0.6);
        const isMuted = fretboard[stringIdx] === -1;
        const stringLabel = `${stringIdx + 1}弦`;
        const nutClass = isMuted ? 'bg-red-900/30 text-red-400' : 
                         fretboard[stringIdx] === 0 ? 'bg-blue-900/50 text-blue-300' : 'bg-slate-700 text-slate-300 hover:bg-slate-600';
        
        let fretsHTML = '';
        for (let fretIdx = 0; fretIdx < FRETS; fretIdx++) {
          const fretNum = fretIdx + 1;
          const isActive = fretboard[stringIdx] === fretNum;
          const noteName = isActive ? transposeNote(tuning[stringIdx], fretNum).replace(/\d+$/, '') : '';
          
          fretsHTML += `
            <div onclick="handleFretClick(${stringIdx}, ${fretNum})" class="flex-1 h-12 flex justify-center items-center cursor-pointer border-r border-slate-600/50 hover:bg-slate-400/10 transition-colors relative group">
              <div class="w-6 h-6 rounded-full flex items-center justify-center shadow-lg transition-all transform ${isActive ? 'bg-blue-500 scale-100 opacity-100' : 'bg-transparent scale-50 opacity-0 group-hover:scale-100 group-hover:opacity-20 group-hover:bg-blue-300'}">
                ${isActive ? `<span class="text-[10px] font-bold text-white drop-shadow-md">${noteName}</span>` : ''}
              </div>
            </div>
          `;
        }

        stringsHTML += `
          <div class="relative flex items-center h-10 group">
            <div class="absolute left-16 right-0 bg-gradient-to-r from-slate-500 to-slate-400 shadow-sm transition-all duration-200 pointer-events-none ${isMuted ? 'opacity-30' : 'opacity-100'}" style="height: ${stringThickness}px"></div>
            <div onclick="toggleMuteOrPlay(${stringIdx})" class="flex-shrink-0 w-16 h-10 flex items-center justify-between px-2 cursor-pointer border-r-4 border-slate-900 rounded-l-md transition-colors ${nutClass}">
              <span class="text-[10px] opacity-60 font-mono">${stringLabel}</span>
              <span class="font-bold flex items-center gap-1">
                ${isMuted ? `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>` : openNote}
              </span>
            </div>
            ${fretsHTML}
          </div>
        `;
      });
      stringsContainer.innerHTML = stringsHTML;
    }

    function renderChordAndNotes() {
      const activeNotes = fretboard.map((fret, i) => fret === -1 ? null : transposeNote(tuning[i], fret)).filter(n => n);
      const uniqueNoteNames = [...new Set(activeNotes.map(n => n.replace(/\d+$/, '')))];
      
      let chordText = "無 (請按弦)";
      if (uniqueNoteNames.length === 1) chordText = uniqueNoteNames[0] + " (單音)";
      else if (uniqueNoteNames.length > 1) chordText = `組合: ${uniqueNoteNames.join(" / ")}`;

      document.getElementById('detected-chord').innerText = chordText;

      const notesHTML = activeNotes.map(note => `<span class="px-2 py-1 bg-slate-700 rounded text-xs font-mono text-slate-300">${note}</span>`).join('');
      document.getElementById('active-notes').innerHTML = notesHTML;
    }

    function renderTablature() {
      const tabContainer = document.getElementById('tab-score');
      let tabHTML = '<div class="flex flex-col w-full gap-2 py-2">';
      
      fretboard.forEach((fret, idx) => {
        const stringName = tuning[idx].replace(/\d+$/, '');
        const displayFret = fret === -1 ? 'X' : fret;
        tabHTML += `
          <div class="relative h-6 flex items-center w-full">
            <div class="w-6 text-center text-sm font-bold text-slate-400 shrink-0">${stringName}</div>
            <div class="flex-1 relative h-full flex items-center">
               <div class="absolute left-0 right-0 h-[2px] bg-slate-300"></div>
               <div class="relative z-10 px-2 bg-white ml-8 font-bold text-slate-700">${displayFret}</div>
            </div>
          </div>
        `;
      });
      tabHTML += '</div>';
      tabContainer.innerHTML = tabHTML;
    }

    // --- 初始掛載 ---
    window.addEventListener('DOMContentLoaded', () => {
      // 1. 產生調弦選單
      const selectEl = document.getElementById('tuning-select');
      Object.keys(TUNINGS).forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        option.innerText = name;
        selectEl.appendChild(option);
      });

      // 2. 產生琴格標記點背景
      const markersContainer = document.getElementById('fret-markers');
      let markersHTML = '<div class="w-16 flex-shrink-0"></div>';
      for(let i=1; i<=FRETS; i++) {
        const isSingle = [3, 5, 7, 9].includes(i);
        const isDouble = i === 12;
        markersHTML += `<div class="flex-1 flex flex-col justify-center items-center h-full">`;
        if(isSingle) markersHTML += `<div class="w-4 h-4 rounded-full bg-slate-600/40"></div>`;
        if(isDouble) markersHTML += `<div class="flex flex-col gap-6"><div class="w-4 h-4 rounded-full bg-slate-600/40"></div><div class="w-4 h-4 rounded-full bg-slate-600/40"></div></div>`;
        markersHTML += `</div>`;
      }
      markersContainer.innerHTML = markersHTML;

      // 3. 產生底部的琴格數字
      const numbersContainer = document.getElementById('fret-numbers');
      let numbersHTML = '';
      for(let i=1; i<=FRETS; i++) {
        numbersHTML += `<div class="flex-1 text-center">${i}</div>`;
      }
      numbersContainer.innerHTML = numbersHTML;

      // 4. 初次渲染 UI
      updateUI();
    });

  </script>
</body>
</html>
